name: weixin

on:
  workflow_dispatch:
  schedule:
    # 北京时间 8:00（UTC 0:00）
    # GitHub Actions 调度可能有 5-15 分钟延迟
    # 实际收到时间可能在 8:00-8:15 之间
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create config from secrets
        run: |
          # 从 GitHub Secrets 读取用户ID并转换为JSON数组
          USER_IDS_JSON=$(echo '${{ secrets.USER_IDS }}' | tr ',' '\n' | sed 's/^/"/;s/$/"/' | tr '\n' ',' | sed 's/,$//')
          
          cat > config.txt << EOF
          {
            "app_id": "${{ secrets.APP_ID }}",
            "app_secret": "${{ secrets.APP_SECRET }}",
            "template_id": "${{ secrets.TEMPLATE_ID }}",
            "user": [${USER_IDS_JSON}],
            "province": "浙江",
            "city": "杭州",
            "birthday1": {"name": "凯凯咪", "birthday": "2001-07-20"},
            "birthday2": {"name": "热热咪", "birthday": "2000-12-31"},
            "love_date": "2022-06-16"
          }
          EOF
          
          echo "Config file created successfully"
      
      - name: Run weixin push
        run: python main.py
