name: weixin

on:
  workflow_dispatch:
  schedule:
    # 北京时间 8:00（UTC 0:00）
    # GitHub Actions 调度可能有 5-15 分钟延迟
    # 实际收到时间可能在 8:00-8:15 之间
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run weixin push
        run: python main.py
